<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多種表單元素展示</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h1>多種表單元素展示</h1>
        <form id="myForm" action="#" method="post" novalidate>
            <!-- 1. 文字輸入 -->
            <div class="form-group">
                <label for="name">姓名 (文字輸入): <span style="color:red">*</span></label>
                <input type="text" id="name" name="name" placeholder="請輸入您的姓名">
                <div class="error-msg" style="color:red; display:none; font-size:14px; margin-top:5px;">此為必要欄位</div>
            </div>

            <!-- 帳號 -->
            <div class="form-group">
                <label for="username">帳號 (文字輸入): <span style="color:red">*</span></label>
                <input type="text" id="username" name="username" placeholder="請輸入您的帳號" pattern="[A-Za-z0-9]+">
                <div class="error-msg" style="color:red; display:none; font-size:14px; margin-top:5px;">此為必要欄位</div>
            </div>

            <!-- 密碼 -->
            <div class="form-group">
                <label for="password">密碼 (密碼輸入): <span style="color:red">*</span></label>
                <input type="password" id="password" name="password" placeholder="請輸入您的密碼" pattern="[A-Za-z0-9]+">
                <div class="error-msg" style="color:red; display:none; font-size:14px; margin-top:5px;">此為必要欄位</div>
            </div>

            <!-- 2. 下拉選單 -->
            <div class="form-group">
                <label for="country">國家 (下拉選單): <span style="color:red">*</span></label>
                <select id="country" name="country">
                    <option value="">請選擇</option>
                    <option value="tw">台灣</option>
                    <option value="jp">日本</option>
                    <option value="us">美國</option>
                    <option value="kr">韓國</option>
                    <option value="cn">中國</option>
                    <option value="gb">英國</option>
                    <option value="ca">加拿大</option>
                    <option value="au">澳洲</option>
                    <option value="de">德國</option>
                    <option value="fr">法國</option>
                    <option value="it">義大利</option>
                    <option value="es">西班牙</option>
                    <option value="nl">荷蘭</option>
                    <option value="se">瑞典</option>
                    <option value="no">挪威</option>
                    <option value="dk">丹麥</option>
                    <option value="fi">芬蘭</option>
                    <option value="ch">瑞士</option>
                    <option value="at">奧地利</option>
                </select>
                <div class="error-msg" style="color:red; display:none; font-size:14px; margin-top:5px;">此為必要欄位</div>
            </div>

            <!-- 3. 標籤單選 (原為勾選框) -->
            <div class="form-group">
                <label for="interest-select">興趣 (清單選擇): <span style="color:red">*</span></label>
                <select id="interest-select">
                    <option value="">請選擇興趣加入清單...</option>
                    <option value="reading">閱讀</option>
                    <option value="sports">運動</option>
                    <option value="music">音樂</option>
                    <option value="travel">旅遊</option>
                    <option value="cooking">烹飪</option>
                    <option value="painting">繪畫</option>
                    <option value="photography">攝影</option>
                    <option value="gaming">遊戲</option>
                    <option value="movies">電影</option>
                    <option value="dancing">舞蹈</option>
                    <option value="yoga">瑜伽</option>
                    <option value="swimming">游泳</option>
                    <option value="running">跑步</option>
                    <option value="writing">寫作</option>
                    <option value="gardening">園藝</option>
                    <option value="fishing">釣魚</option>
                    <option value="hiking">登山</option>
                    <option value="cycling">騎車</option>
                    <option value="singing">唱歌</option>
                </select>
                <div id="interest-tags" class="tags-container"></div>
                <!-- 隱藏的 input 用來儲存標籤值並讓原本的表單驗證能捕捉到 -->
                <input type="hidden" id="interest-hidden" name="interest">
                <div class="error-msg" id="interest-error" style="color:red; display:none; font-size:14px; margin-top:5px;">此為必要欄位</div>
            </div>

            <!-- 4. 單選按鈕 -->
            <div class="form-group">
                <label>性別 (單選按鈕): <span style="color:red">*</span></label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="male">男性</label>
                    <label><input type="radio" name="gender" value="female">女性</label>
                    <label><input type="radio" name="gender" value="other">其他</label>
                </div>
                <div class="error-msg" style="color:red; display:none; font-size:14px; margin-top:5px;">此為必要欄位</div>
            </div>

            <!-- 5. 日期選擇 -->
            <div class="form-group">
                <label for="birthdate">出生日期 (日期選擇): <span style="color:red">*</span></label>
                <input type="date" id="birthdate" name="birthdate">
                <div class="error-msg" style="color:red; display:none; font-size:14px; margin-top:5px;">此為必要欄位</div>
            </div>

            <!-- 6. 數字輸入 -->
            <div class="form-group">
                <label for="age">年齡 (數字輸入): <span style="color:red">*</span></label>
                <input type="number" id="age" name="age" min="1" max="120" placeholder="請輸入年齡">
                <div class="error-msg" style="color:red; display:none; font-size:14px; margin-top:5px;">此為必要欄位</div>
            </div>

            <!-- 7. 文字區域 -->
            <div class="form-group">
                <label for="message">留言 (文字區域):</label>
                <textarea id="message" name="message" rows="4" placeholder="請輸入您的留言"></textarea>
            </div>

            <button type="submit">提交表單</button>
        </form>
    </div>

    <script>
        // 標籤邏輯 (Interest Tags)
        const interestSelect = document.getElementById('interest-select');
        const interestTagsContainer = document.getElementById('interest-tags');
        const interestHidden = document.getElementById('interest-hidden');
        let selectedInterests = new Set();

        if (interestSelect) {
            interestSelect.addEventListener('change', function() {
                const value = this.value;
                const text = this.options[this.selectedIndex].text;
                
                if (value && !selectedInterests.has(value)) {
                    selectedInterests.add(value);
                    
                    // 建立標籤外框
                    const tag = document.createElement('span');
                    tag.className = 'interest-tag';
                    tag.dataset.value = value;
                    tag.textContent = text;
                    
                    // 建立刪除按鈕 (叉叉)
                    const removeBtn = document.createElement('span');
                    removeBtn.className = 'remove-tag';
                    removeBtn.innerHTML = '&times;';
                    removeBtn.onclick = function() {
                        selectedInterests.delete(value);
                        tag.remove();
                        updateHiddenInput();
                    };
                    
                    tag.appendChild(removeBtn);
                    interestTagsContainer.appendChild(tag);
                    updateHiddenInput();
                }
                
                // 重置選單
                this.selectedIndex = 0;
            });
        }

        function updateHiddenInput() {
            interestHidden.value = Array.from(selectedInterests).join(',');
            // 如果有值，順便檢查並隱藏錯誤訊息
            if (selectedInterests.size > 0) {
                const errorMsg = document.getElementById('interest-error');
                if(errorMsg) errorMsg.style.display = 'none';
            }
        }

        document.getElementById('myForm').addEventListener('submit', function(event) {
            event.preventDefault(); // 防止跳轉 404
            
            let isAllValid = true;

            const requiredFields = [
                { id: 'name', type: 'input' },
                { id: 'username', type: 'input' },
                { id: 'password', type: 'input' },
                { id: 'country', type: 'select' },
                { id: 'interest-hidden', type: 'input' },
                { name: 'gender', type: 'radio' },
                { id: 'birthdate', type: 'input' },
                { id: 'age', type: 'input' }
            ];

            // 隱藏所有錯誤訊息並重新驗證
            document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');

            requiredFields.forEach(field => {
                let isValid = false;
                let groupElement = null;

                if (field.type === 'input' || field.type === 'select') {
                    const el = document.getElementById(field.id);
                    if (el) {
                        isValid = el.value.trim() !== '';
                        groupElement = el.closest('.form-group');
                    }
                } else if (field.type === 'checkbox' || field.type === 'radio') {
                    const els = document.querySelectorAll(`input[name="${field.name}"]`);
                    for (let el of els) {
                        if (el.checked) {
                            isValid = true;
                            break;
                        }
                    }
                    if (els.length > 0) {
                        groupElement = els[0].closest('.form-group');
                    }
                }

                if (groupElement) {
                    const errorMsg = groupElement.querySelector('.error-msg');
                    if (!isValid) {
                        if (errorMsg) errorMsg.style.display = 'block';
                        isAllValid = false;
                    }
                }
            });

            if (isAllValid) {
                alert('已經儲存');
            } else {
                alert('尚有資料未填寫齊全');
            }
        });
    </script>
</body>
</html>
